    <style>

        .check-btn {

        /* Animasi getar untuk interaksi belum dijawab */

        }
    </style>

<script>
    // ====================== SLIDE DATA (TOTAL 31 SLIDE) ======================
    const slides = [
        // COVER (tanpa BAB 8 & 6)
        {
            type: 'content',
            blocks: [{ html: `<div class="cover"><h1>Persamaan Diferensial Orde Dua</h1><h2>Homogen & Nonhomogen + Orde Tinggi</h2><hr style="background:white; margin:20px 0;"><p><strong>Kelompok 2</strong><br>Dosen: Edy Wihardja, S.Pd., M.Pd., M.C.E.<br>Dr. Arif Fatahillah, S.Pd., M.Si.</p><p>📅 11 Mei 2026</p></div>`, cls: '' }]
        },
        // ANGGOTA
        {
            type: 'content',
            blocks: [{ html: `<h3>👥 Anggota Kelompok 2</h3><div class="anggota-grid">${['Ahmad Reza Fahlavi (029)','Muhammad Halim Abdullah (035)','Fikri Permata Ramadhani (152)','Febilia Dinda Haqiqie (061)','Intan Nur Aini (165)','Deni Hidayatul Arifin (127)','Frenina Amanda (160)','Iza Afkarina Ramadani (153)'].map(n => `<span class="anggota-card">${n}</span>`).join('')}</div><p><span class="badge">📌 Pokok Bahasan</span> Bentuk umum PD orde 2, solusi homogen (3 kasus akar), solusi nonhomogen (koefisien tak tentu), PD orde tinggi homogen & nonhomogen.</p>`, cls: '' }]
        },
        // BENTUK UMUM
        {
            type: 'content',
            blocks: [
                { html: `<h3>📐 1. Bentuk Umum PD Orde Dua</h3><p>Persamaan diferensial linear orde dua koefisien konstan:</p>`, cls: '' },
                { html: `\\[ y'' + p y' + q y = r(x) \\]`, cls: 'math-block' },
                { html: `<p>➜ Jika \\( r(x) = 0 \\) → <strong>Homogen</strong><br>➜ Jika \\( r(x) \\neq 0 \\) → <strong>Nonhomogen</strong></p>`, cls: '' }
            ]
        },
        // PERSAMAAN KARAKTERISTIK
        {
            type: 'content',
            blocks: [
                { html: `<h3>⚫ 2. PD Homogen Orde Dua</h3><p>Bentuk: \\( y'' + p y' + q y = 0 \\)</p><p>Substitusi \\( y = e^{kx} \\) menghasilkan:</p>`, cls: '' },
                { html: `\\[ k^2 + p k + q = 0 \\]`, cls: 'math-block' },
                { html: `<p>Ini disebut <strong>Persamaan Karakteristik</strong>.</p>`, cls: '' }
            ]
        },
        // KASUS 1: REAL BERBEDA
        {
            type: 'content',
            blocks: [
                { html: `<h4>📌 Kasus 1: Akar Real Berbeda</h4><p>Syarat: \\( p^2 - 4q > 0 \\) → \\( k_1 \\neq k_2 \\)</p>`, cls: '' },
                { html: `\\[ y = C_1 e^{k_1 x} + C_2 e^{k_2 x} \\]`, cls: 'math-block' }
            ]
        },
        // KASUS 2: AKAR KEMBAR
        {
            type: 'content',
            blocks: [
                { html: `<h4>📌 Kasus 2: Akar Real Kembar</h4><p>Syarat: \\( p^2 - 4q = 0 \\) → \\( k_1 = k_2 = m \\)</p>`, cls: '' },
                { html: `\\[ y = C_1 e^{mx} + C_2 x e^{mx} \\]`, cls: 'math-block' }
            ]
        },
        // KASUS 3: KOMPLEKS
        {
            type: 'content',
            blocks: [
                { html: `<h4>📌 Kasus 3: Akar Kompleks Konjugat</h4><p>Syarat: \\( p^2 - 4q < 0 \\) → \\( k_{1,2} = \\alpha \\pm i\\beta \\)</p>`, cls: '' },
                { html: `\\[ y = e^{\\alpha x} \\left( C_1 \\cos(\\beta x) + C_2 \\sin(\\beta x) \\right) \\]`, cls: 'math-block' }
            ]
        },
        // CONTOH 6.1
        {
            type: 'content',
            blocks: [
                { html: `<div class="content-block example"><h4>✨ Contoh 6.1 (Homogen)</h4><p>Selesaikan \\( y'' - 4y = 0 \\)</p><p>Persamaan karakteristik: \\( k^2 - 4 = 0 \\) → \\( k = \\pm 2 \\) (real berbeda).</p>`, cls: '' },
                { html: `\\[ y = C_1 e^{2x} + C_2 e^{-2x} \\]`, cls: 'math-block' },
                { html: `<p>Bentuk alternatif: \\( y = A \\sinh(2x) + B \\cosh(2x) \\)</p></div>`, cls: '' }
            ]
        },
        // PD NONHOMOGEN
        {
            type: 'content',
            blocks: [
                { html: `<h3>🟠 3. PD Non Homogen Orde Dua</h3><p>Bentuk: \\( y'' + p y' + q y = r(x) \\)</p><p>Solusi total: \\( y = y_h + y_p \\)<br>➜ \\( y_h \\) = solusi homogen<br>➜ \\( y_p \\) = solusi khusus (metode koefisien tak tentu)</p>`, cls: '' }
            ]
        },
        // TABEL TEBAKAN
        {
            type: 'content',
            blocks: [
                { html: `<h4>📋 Tabel Tebakan \\( y_p \\)</h4><ul><li>Jika \\( r(x) = P_n(x) \\) (polinom) → \\( y_p = A_n x^n + ... + A_0 \\)</li><li>Jika \\( r(x) = e^{ax} \\) → \\( y_p = A e^{ax} \\)</li><li>Jika \\( r(x) = \\cos(\\beta x) \\) atau \\( \\sin(\\beta x) \\) → \\( y_p = M\\cos(\\beta x) + N\\sin(\\beta x) \\)</li><li>Jika terjadi <strong>resonansi</strong> (akar karakteristik sama dengan bentuk tebakan), kalikan dengan \\( x^m \\) (m = multiplisitas akar).</li></ul>`, cls: '' }
            ]
        },
        // CONTOH 6.6
        {
            type: 'content',
            blocks: [
                { html: `<div class="content-block example"><h4>📝 Contoh 6.6 (Polinom)</h4><p>Tentukan solusi umum \\( y'' - 2y' + y = x^2 \\)</p><p><strong>Homogen:</strong> \\( k^2 - 2k + 1 = (k-1)^2 = 0 \\) → \\( y_h = (C_1 + C_2 x)e^x \\)</p><p><strong>Tebakan:</strong> \\( y_p = Ax^2 + Bx + C \\)</p>`, cls: '' },
                { html: `Substitusi: \\( y_p' = 2Ax + B,\\; y_p'' = 2A \\)`, cls: 'math-block' },
                { html: `\\[ 2A - 2(2Ax + B) + (Ax^2 + Bx + C) = x^2 \\]`, cls: 'math-block' },
                { html: `\\[ Ax^2 + (B-4A)x + (2A-2B+C) = x^2 \\]`, cls: 'math-block' },
                { html: `\\( A = 1,\\; B = 4,\\; C = 6 \\) → \\( y_p = x^2 + 4x + 6 \\)`, cls: '' },
                { html: `<strong>Solusi umum:</strong> \\( y = (C_1 + C_2 x)e^x + x^2 + 4x + 6 \\)</div>`, cls: '' }
            ]
        },
        // CONTOH TRIGONOMETRI
        {
            type: 'content',
            blocks: [
                { html: `<div class="content-block example"><h4>📐 Contoh (Trigonometri)</h4><p>Selesaikan \\( y'' + y = \\cos 2x \\)</p><p><strong>Homogen:</strong> \\( y_h = A\\cos x + B\\sin x \\)</p><p><strong>Tebakan:</strong> \\( y_p = M\\cos 2x + N\\sin 2x \\)</p>`, cls: '' },
                { html: `Substitusi: \\( -4M\\cos2x -4N\\sin2x + M\\cos2x + N\\sin2x = \\cos2x \\)`, cls: 'math-block' },
                { html: `\\[ -3M\\cos2x -3N\\sin2x = \\cos2x \\]`, cls: 'math-block' },
                { html: `\\( M = -\\frac{1}{3},\\; N = 0 \\) → \\( y_p = -\\frac{1}{3}\\cos 2x \\)`, cls: '' },
                { html: `<strong>Solusi umum:</strong> \\( y = A\\cos x + B\\sin x - \\frac{1}{3}\\cos 2x \\)</div>`, cls: '' }
            ]
        },
        // CONTOH EKSPONENSIAL
        {
            type: 'content',
            blocks: [
                { html: `<div class="content-block example"><h4>⚡ Contoh (Eksponensial)</h4><p>Selesaikan \\( y'' + y = 3e^{4x} \\)</p><p><strong>Homogen:</strong> \\( y_h = A\\cos x + B\\sin x \\)</p><p><strong>Tebakan:</strong> \\( y_p = Ke^{4x} \\)</p>`, cls: '' },
                { html: `Substitusi: \\( 16Ke^{4x} + Ke^{4x} = 3e^{4x} \\)`, cls: 'math-block' },
                { html: `\\[ 17K = 3 \\Rightarrow K = \\frac{3}{17} \\]`, cls: 'math-block' },
                { html: `<strong>Solusi umum:</strong> \\( y = A\\cos x + B\\sin x + \\frac{3}{17}e^{4x} \\)</div>`, cls: '' }
            ]
        },
        // ORDE TINGGI
        {
            type: 'content',
            blocks: [
                { html: `<h3>📈 4. PD Linier Orde Tinggi</h3><p>Bentuk umum PD linier orde ke-n dengan koefisien konstan:</p>`, cls: '' },
                { html: `\\[ a_n y^{(n)} + a_{n-1} y^{(n-1)} + \\dots + a_1 y' + a_0 y = r(x) \\]`, cls: 'math-block' },
                { html: `<p>dengan \\( a_n \\neq 0 \\).</p>`, cls: '' }
            ]
        },
        // ORDE TINGGI HOMOGEN + CONTOH 6.9
        {
            type: 'content',
            blocks: [
                { html: `<h3>🔷 5. PD Orde Tinggi Homogen</h3><p>Bentuk: \\( a_n y^{(n)} + ... + a_0 y = 0 \\)<br>Persamaan karakteristik: \\( a_n k^n + a_{n-1} k^{n-1} + ... + a_0 = 0 \\)</p>`, cls: '' },
                { html: `<div class="content-block example"><h4>📌 Contoh 6.9 (Orde 3 Homogen)</h4><p>Selesaikan \\( y''' - 2y'' = 0 \\)</p><p>Persamaan karakteristik: \\( k^3 - 2k^2 = k^2(k-2) = 0 \\)<br>Akar: \\( k = 0 \\) (multiplisitas 2), \\( k = 2 \\) (multiplisitas 1)</p>`, cls: '' },
                { html: `\\[ y_h = C_1 + C_2 x + C_3 e^{2x} \\]`, cls: 'math-block' },
                { html: `<p><em>Setiap akar multiplisitas m memberikan kontribusi \\( (C_1 + C_2 x + ... + C_m x^{m-1}) e^{kx} \\)</em></p></div>`, cls: '' }
            ]
        },
        // ORDE TINGGI NONHOMOGEN + CONTOH 6.12
        {
            type: 'content',
            blocks: [
                { html: `<h3>🟡 6. PD Orde Tinggi Nonhomogen</h3><p>Prinsip sama dengan orde 2: \\( y = y_h + y_p \\).<br>Metode koefisien tak tentu dengan memperhatikan resonansi (akar berulang).</p>`, cls: '' },
                { html: `<div class="content-block example"><h4>📌 Contoh 6.12 (Nonhomogen orde 3)</h4><p>Selesaikan \\( y''' - 2y'' = x \\)</p><p><strong>Homogen:</strong> \\( y_h = C_1 + C_2 x + C_3 e^{2x} \\)</p><p><strong>Tebakan:</strong> Karena \\( k=0 \\) akar multiplisitas 2, tebakan dikalikan \\( x^2 \\): \\( y_p = Ax^3 + Bx^2 \\)</p>`, cls: '' },
                { html: `Turunan: \\( y_p' = 3Ax^2 + 2Bx,\\; y_p'' = 6Ax + 2B,\\; y_p''' = 6A \\)`, cls: 'math-block' },
                { html: `Substitusi ke \\( y''' - 2y'' = x \\):`, cls: '' },
                { html: `\\[ 6A - 2(6Ax + 2B) = x \\]`, cls: 'math-block' },
                { html: `\\[ -12Ax + (6A-4B) = x \\]`, cls: 'math-block' },
                { html: `Samakan koefisien:<br>\\( -12A = 1 \\Rightarrow A = -\\frac{1}{12} \\)<br>\\( 6A - 4B = 0 \\Rightarrow 6(-\\frac{1}{12}) - 4B = 0 \\Rightarrow -\\frac{1}{2} - 4B = 0 \\Rightarrow B = -\\frac{1}{8} \\)`, cls: '' },
                { html: `\\[ y_p = -\\frac{1}{12}x^3 - \\frac{1}{8}x^2 \\]`, cls: 'math-block' },
                { html: `<strong>Solusi umum:</strong> \\( y = C_1 + C_2 x + C_3 e^{2x} - \\frac{1}{12}x^3 - \\frac{1}{8}x^2 \\)</div>`, cls: '' }
            ]
        },
        // SOAL 1
        { type: 'mcq', question: 'Persamaan karakteristik dari y\'\' - 5y\' + 6y = 0 memiliki akar-akar ...', options: [{ id: 'A', text: '2 dan 3' },{ id: 'B', text: '-2 dan -3' },{ id: 'C', text: '2 dan -3' },{ id: 'D', text: '1 dan 6' }], correct: 'A', fc: '✅ Benar! k² - 5k + 6 = (k-2)(k-3)=0 → k = 2 dan 3 (real berbeda).', fi: '❌ Coba faktorkan: k² - 5k + 6 = (k-2)(k-3)=0 → jawaban A.' },
        // SOAL 2
        { type: 'tf', statement: '"PD homogen orde dua selalu memiliki dua solusi yang bebas linear sehingga ruang solusinya berdimensi 2."', correct: true, fc: '✅ Benar! Prinsip superposisi pada PD linear homogen menjamin dua solusi fundamental bebas linear.', fi: '❌ Pernyataan tersebut benar: PD linier homogen orde n memiliki ruang solusi berdimensi n.' },
        // SOAL 3
        { type: 'mcq', question: 'Persamaan diferensial y\'\' + 4y\' + 13y = 0 memiliki akar karakteristik k = -2 ± 3i. Solusi umumnya adalah ...', options: [{ id: 'A', text: '\\( y = e^{-2x}(C_1 \\cos 3x + C_2 \\sin 3x) \\)' },{ id: 'B', text: '\\( y = e^{2x}(C_1 \\cos 3x + C_2 \\sin 3x) \\)' },{ id: 'C', text: '\\( y = e^{-3x}(C_1 \\cos 2x + C_2 \\sin 2x) \\)' },{ id: 'D', text: '\\( y = C_1 e^{-2x} + C_2 e^{-3x} \\)' }], correct: 'A', fc: '✅ Benar! Untuk akar α ± iβ, solusi umum y = e^{αx}(C₁ cos βx + C₂ sin βx) dengan α = -2, β = 3.', fi: '❌ Ingat rumus: y = e^{αx}(C₁ cos βx + C₂ sin βx). Dengan α = -2, β = 3 → jawaban A.' },
        // SOAL 4
        { type: 'numberinput', question: 'Pada contoh y\'\' - 2y\' + y = x², nilai koefisien B dari y_p = x² + Bx + C adalah ...', correctAnswer: '4', fc: '✅ Benar! Setelah menyamakan koefisien diperoleh B = 4.', fi: '❌ Hitung ulang: dari B - 4A = 0, dengan A=1 → B=4.' },
        // SOAL 5
        { type: 'mcq', question: 'Solusi umum dari y\'\' + 4y = 0 adalah ...', options: [{ id: 'A', text: '\\( C_1 \\cos 2x + C_2 \\sin 2x \\)' },{ id: 'B', text: '\\( C_1 e^{2x} + C_2 e^{-2x} \\)' },{ id: 'C', text: '\\( C_1 \\cos 4x + C_2 \\sin 4x \\)' },{ id: 'D', text: '\\( C_1 e^{2x} \\cos x + C_2 e^{2x} \\sin x \\)' }], correct: 'A', fc: '✅ Benar! k²+4=0 → k=±2i → α=0, β=2 → y = C₁ cos 2x + C₂ sin 2x.', fi: '❌ Persamaan karakteristik: k²+4=0 → k=±2i → solusi dalam cos dan sin dengan β=2 → jawaban A.' },
        // SOAL 6
        { type: 'mcq', question: 'Pada PD y\'\' - 2y\' + y = e^x, tebakan y_p yang tepat adalah ... (karena terjadi resonansi)', options: [{ id: 'A', text: '\\( A e^{x} \\)' },{ id: 'B', text: '\\( A x e^{x} \\)' },{ id: 'C', text: '\\( A x^2 e^{x} \\)' },{ id: 'D', text: '\\( A e^{2x} \\)' }], correct: 'B', fc: '✅ Benar! Akar karakteristik k=1 (kembar), ruas kanan e^x → resonansi → kalikan dengan x → A x e^x.', fi: '❌ Karena akar kembar m=2, tebakan dikalikan x → A x e^x (jawaban B).' },
        // SOAL 7
        { type: 'mcq', question: 'Jika persamaan karakteristik memiliki akar k = 0 dengan multiplisitas 3, maka kontribusi akar tersebut ke solusi homogen adalah ...', options: [{ id: 'A', text: '\\( C_1 + C_2 x \\)' },{ id: 'B', text: '\\( C_1 + C_2 x + C_3 x^2 \\)' },{ id: 'C', text: '\\( C_1 e^{x} + C_2 e^{2x} + C_3 e^{3x} \\)' },{ id: 'D', text: '\\( C_1 \\cos x + C_2 \\sin x + C_3 x \\)' }], correct: 'B', fc: '✅ Benar! Akar 0 multiplisitas 3 memberikan C₁ + C₂ x + C₃ x².', fi: '❌ Untuk multiplisitas 3: C₁ + C₂ x + C₃ x² (jawaban B).' },
        // PENUTUP
        {
            type: 'content',
            blocks: [
                { html: `<div class="cover" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"><h2>✨ Terima Kasih ✨</h2><p style="font-size:1.2rem;">Persamaan Diferensial Orde Dua & Aplikasi</p><p>Kelompok 2 - Universitas Jember</p><hr style="background:white; margin:16px 0;"><p>Semoga Bermanfaat dan Memahami Konsep dengan Baik!</p><p>📖 Tetap Semangat Belajar!</p></div>`, cls: '' }
            ]
        }
    ];

    // ---------------------- STATE & DOM ----------------------
    let currentIdx = 0;
    let blocksRevealed = 1;
    let interactiveDone = false;
    let isAnimating = false;

    const slideInner = document.getElementById('slide-inner');
    const slideContent = document.getElementById('slide-content');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const indicatorSpan = document.getElementById('slideIndicator');

    function updateIndicator() {
        indicatorSpan.innerText = `Slide ${currentIdx + 1} / ${slides.length}`;
        prevBtn.disabled = (currentIdx === 0);
    }

    async function typesetMath() {
        if (window.MathJax && window.MathJax.typesetPromise) {
            await window.MathJax.typesetPromise([slideContent]);
        }
    }

    function resetState() {
        if (slides[currentIdx].type === 'content') blocksRevealed = 1;
        interactiveDone = false;
    }

    // RENDER functions
    function renderContent(slide) {
        slideContent.innerHTML = '';
        for (let i = 0; i < blocksRevealed && i < slide.blocks.length; i++) {
            const div = document.createElement('div');
            div.className = `content-block ${slide.blocks[i].cls || ''}`;
            div.innerHTML = slide.blocks[i].html;
            slideContent.appendChild(div);
        }
        if (blocksRevealed >= slide.blocks.length) interactiveDone = true;
        typesetMath();
    }

    function renderMCQ(slide) {
        slideContent.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = 'content-block interactive-area';
        wrapper.innerHTML = `<p><strong>📝 Pilihan Ganda</strong></p><p>${slide.question}</p><div id="mcq-buttons"></div><div class="feedback-msg" style="display:none;"></div>`;
        slideContent.appendChild(wrapper);
        const btnsDiv = wrapper.querySelector('#mcq-buttons');
        slide.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerHTML = `${opt.id}. ${opt.text}`;
            btn.classList.add('mcq-option');
            btn.dataset.opt = opt.id;
            btn.addEventListener('click', () => {
                if (interactiveDone) return;
                const fb = wrapper.querySelector('.feedback-msg');
                const allBtns = wrapper.querySelectorAll('.mcq-option');
                allBtns.forEach(b => b.classList.remove('selected', 'correct', 'incorrect'));
                btn.classList.add('selected');
                if (opt.id === slide.correct) {
                    btn.classList.add('correct');
                    fb.textContent = slide.fc;
                    fb.className = 'feedback-msg correct';
                } else {
                    btn.classList.add('incorrect');
                    fb.textContent = slide.fi;
                    fb.className = 'feedback-msg incorrect';
                    allBtns.forEach(b => { if (b.dataset.opt === slide.correct) b.classList.add('correct'); });
                }
                fb.style.display = 'block';
                interactiveDone = true;
                typesetMath();
            });
            btnsDiv.appendChild(btn);
        });
        typesetMath();
    }

    function renderTF(slide) {
        slideContent.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = 'content-block interactive-area';
        wrapper.innerHTML = `<p><strong>✅❌ True/False</strong></p><p>${slide.statement}</p><div style="display:flex; gap:12px; flex-wrap:wrap;"><button class="tf-btn" data-val="true">✅ True (Benar)</button><button class="tf-btn" data-val="false">❌ False (Salah)</button></div><div class="feedback-msg" style="display:none;"></div>`;
        slideContent.appendChild(wrapper);
        const btns = wrapper.querySelectorAll('.tf-btn');
        const fb = wrapper.querySelector('.feedback-msg');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (interactiveDone) return;
                const chosen = btn.dataset.val === 'true';
                btns.forEach(b => b.classList.remove('correct', 'incorrect'));
                if (chosen === slide.correct) {
                    btn.classList.add('correct');
                    fb.textContent = slide.fc;
                    fb.className = 'feedback-msg correct';
                } else {
                    btn.classList.add('incorrect');
                    fb.textContent = slide.fi;
                    fb.className = 'feedback-msg incorrect';
                    btns.forEach(b => { if ((b.dataset.val === 'true') === slide.correct) b.classList.add('correct'); });
                }
                fb.style.display = 'block';
                interactiveDone = true;
            });
        });
        typesetMath();
    }

    function renderNumberInput(slide) {
        slideContent.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.className = 'content-block interactive-area';
        wrapper.innerHTML = `<p><strong>🔢 Input Angka</strong></p><p>${slide.question}</p><input type="text" class="answer-input" id="numAns" placeholder="Masukkan angka..."><div><button class="check-btn" id="checkNum">Periksa Jawaban</button></div><div class="feedback-msg" style="display:none;"></div>`;
        slideContent.appendChild(wrapper);
        const inp = wrapper.querySelector('#numAns');
        const btn = wrapper.querySelector('#checkNum');
        const fb = wrapper.querySelector('.feedback-msg');
        const check = () => {
            if (interactiveDone) return;
            const ok = inp.value.trim() === slide.correctAnswer;
            interactiveDone = true;
            if (ok) {
                fb.textContent = slide.fc;
                fb.className = 'feedback-msg correct';
                inp.classList.add('correct');
            } else {
                fb.textContent = slide.fi;
                fb.className = 'feedback-msg incorrect';
                inp.classList.add('incorrect');
            }
            fb.style.display = 'block';
            btn.disabled = true;
            inp.disabled = true;
        };
        btn.addEventListener('click', check);
        inp.addEventListener('keypress', (e) => { if (e.key === 'Enter') check(); });
        typesetMath();
    }

    function renderCurrentSlide() {
        const slide = slides[currentIdx];
        slideContent.innerHTML = '';
        if (slide.type === 'content') renderContent(slide);
        else if (slide.type === 'mcq') renderMCQ(slide);
        else if (slide.type === 'tf') renderTF(slide);
        else if (slide.type === 'numberinput') renderNumberInput(slide);
        updateIndicator();
    }

    // Animasi transisi slide
    function animateSlideChange(updateCallback) {
        if (isAnimating) return;
        isAnimating = true;
        slideInner.classList.add('fade-out');
        setTimeout(() => {
            updateCallback();
            slideInner.classList.remove('fade-out');
            setTimeout(() => { isAnimating = false; }, 60);
        }, 220);
    }

    function navigateToSlide(newIndex) {
        if (newIndex < 0 || newIndex >= slides.length || isAnimating) return false;
        animateSlideChange(() => {
            currentIdx = newIndex;
            resetState();
            renderCurrentSlide();
        });
        return true;
    }

    function nextSlide() {
        const slide = slides[currentIdx];
        if (slide.type === 'content' && blocksRevealed < slide.blocks.length) {
            blocksRevealed++;
            renderCurrentSlide();
            return;
        }
        if (!interactiveDone && slide.type !== 'content') {
            const interactiveDiv = document.querySelector('.interactive-area');
            if (interactiveDiv) {
                interactiveDiv.style.animation = 'none';
                interactiveDiv.offsetHeight;
                interactiveDiv.style.animation = 'shake 0.2s ease-in-out 0s 1';
            }
            return;
        }
        if (currentIdx + 1 < slides.length) navigateToSlide(currentIdx + 1);
    }

    function prevSlide() {
        if (currentIdx - 1 >= 0) navigateToSlide(currentIdx - 1);
    }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
    });

    renderCurrentSlide();
</script>
</body>
</html>
